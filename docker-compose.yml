services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: file:/app/apps/api/prisma/prod.db
      JWT_SECRET: change-me-in-production
      CLIENT_ORIGIN: http://localhost:5173
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - api-data:/app/apps/api/prisma
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_URL: http://localhost:4000
    ports:
      - "5173:80"
    depends_on:
      - api
volumes:
  api-data:
