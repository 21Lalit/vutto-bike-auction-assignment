services:
  - type: web
    name: bike-auction-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm run render:build:api
    startCommand: npm run render:start:api
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: bike-auction-db
          property: connectionString

databases:
  - name: bike-auction-db
    plan: free
    databaseName: bike_auction
    user: bike_auction
